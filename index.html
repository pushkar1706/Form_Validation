<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page">
      <div class="brand">
        <div class="brand-dot"></div>
        <span>REGISTER</span>
      </div>

      <form class="form" id="registerForm" novalidate>
        <!-- Row 1: Prefix + First Name + Last Name -->
        <div class="row">
          <div class="field small">
            <label for="prefix">Prefix</label>
            <select id="prefix" name="prefix">
              <option value="">--</option>
              <option>Mr.</option>
              <option>Ms.</option>
              <option>Mrs.</option>
              <option>Dr.</option>
              <option>Prof.</option>
            </select>
          </div>
          <div class="field">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" placeholder="" />
          </div>
          <div class="field">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" placeholder="" />
          </div>
        </div>

        <!-- Row 2: Username + DOB + Age -->
        <div class="row">
          <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="" />
          </div>
          <div class="field">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" />
          </div>
          <div class="field small">
            <label for="age">Age</label>
            <input
              type="number"
              id="age"
              name="age"
              placeholder=""
              min="1"
              max="120"
            />
          </div>
        </div>

        <!-- Row 3: Gender + Contact -->
        <div class="row">
          <div class="field">
            <label for="gender">Gender</label>
            <select id="gender" name="gender">
              <option value="">Select</option>
              <option>Male</option>
              <option>Female</option>
              <option>Non-binary</option>
              <option>Prefer not to say</option>
            </select>
          </div>
          <div class="field wide">
            <label for="contact">Contact No.</label>
            <input type="tel" id="contact" name="contact" placeholder="" />
          </div>
        </div>

        <!-- Row 4: Email -->
        <div class="row">
          <div class="field full">
            <label for="email">Email ID</label>
            <input type="email" id="email" name="email" placeholder="" />
          </div>
        </div>

        <!-- Row 5: Password + Confirm Password -->
        <div class="row">
          <div class="field">
            <label for="password">Password</label>
            <div class="pass-wrap">
              <input
                type="password"
                id="password"
                name="password"
                placeholder=""
              />
              <button type="button" class="eye-btn" data-target="password">
                &#128065;
              </button>
            </div>
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm Password</label>
            <div class="pass-wrap">
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder=""
              />
              <button
                type="button"
                class="eye-btn"
                data-target="confirmPassword"
              >
                &#128065;
              </button>
            </div>
          </div>
        </div>

        <!-- Error message -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Submit -->
        <div class="row submit-row">
          <button type="submit" class="submit-btn">
            Create Account &rarr;
          </button>
        </div>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
